        if (msg.sender === 'customer') {

                <p class="text-xs text-gray-400 mt-1 text-right">${msg.time}</p>
              </div>
            </div>
          `;
        } else if (msg.sender === 'ai') {
          return `
            <div class="flex justify-end">
              <div class="max-w-[70%] bg-green-100 rounded-2xl rounded-br-md px-4 py-3">

          return `
            <div class="flex justify-center my-2">
              <div class="px-4 py-2 bg-gray-100 rounded-full">
                <p class="text-xs text-gray-600">${msg.text}</p>
              </div>
            </div>
          `;

          return `
            <div class="flex justify-end">
              <div class="max-w-[70%] bg-dental-500 text-white rounded-2xl rounded-br-md px-4 py-3">
                <div class="flex items-center gap-1 mb-1">

                <p class="text-xs text-dental-200 mt-1 text-right">${msg.time}</p>
              </div>

      // Send Reply
      function handleReplyKeypress(e, chatId) {
        if (e.key === 'Enter') sendReply(chatId);
      }

      function sendReply(chatId) {
        const input = document.getElementById('reply-input');
        const text = input.value.trim();
        if (!text) return;

        const chat = chats.find(c => c.id === chatId);
        if (!chat) return;

        const now = new Date();
        const time = now.toTimeString().slice(0, 5);

        chat.messages.push({ sender: 'agent', text, time });
        chat.lastMessage = text;
        chat.time = time;
        chat.respondedBy = 'human';

        input.value = '';
        selectChat(chatId);
        renderChatList();
      }

      // Assign to AI
      function assignToAI(chatId) {
        const chat = chats.find(c => c.id === chatId);
        if (!chat) return;
        chat.status = 'screening';
        chat.respondedBy = 'ai';
        renderChatList();
        updateCounts();

        // Simulate AI response
        setTimeout(() => {
          const now = new Date();
          const time = now.toTimeString().slice(0, 5);
          chat.messages.push({
            sender: 'ai',
            text: '🤖 สวัสดีค่ะ ยินดีให้บริการค่ะ\n\nดิฉันกำลังตรวจสอบข้อมูลให้นะคะ กรุณารอสักครู่ค่ะ...',
            time
          });
          chat.lastMessage = '🤖 สวัสดีค่ะ ยินดีให้บริการค่ะ...';
          chat.time = time;
          if (currentChatId === chatId) selectChat(chatId);
        }, 1000);
      }

</textarea>

            text: correctionMsg,
            time
          });

          chat.messages.push({

            </div>
          `;
        }

        document.getElementById('approve-modal-content').innerHTML = content;
        document.getElementById('approve-modal').classList.remove('hidden');
      }

      function closeApproveModal() {
        document.getElementById('approve-modal').classList.add('hidden');
      }

      function approveCase() {
        if (currentChatId) {
          const chat = chats.find(c => c.id === currentChatId);
          if (chat) {
            chat.status = 'completed';
            const now = new Date();
            const time = now.toTimeString().slice(0, 5);
            chat.messages.push({
              sender: 'ai',
              text: '🤖 อนุมัติแล้วค่ะ! ทีมงานจะติดต่อกลับเพื่อนัดหมายนะคะ ขอบคุณที่ใช้บริการค่ะ 🙏',
              time
            });
            renderChatList();
            updateCounts();
            selectChat(currentChatId);
          }
        }
        closeApproveModal();
      }

      // Update Counts
      function updateCounts() {
        const counts = { 'audit': 0, 'admin-complete': 0, 'ai-complete': 0 };
        chats.forEach(c => {
          if (counts[c.status] !== undefined) counts[c.status]++;
        });

        document.getElementById('count-audit').textContent = counts['audit'];
        document.getElementById('count-admin-complete').textContent = counts['admin-complete'];
        document.getElementById('count-ai-complete').textContent = counts['ai-complete'];

        document.getElementById('total-chats').textContent = chats.length;
        document.getElementById('footer-audit').textContent = counts['audit'];
        document.getElementById('footer-admin-complete').textContent = counts['admin-complete'];
        document.getElementById('footer-ai-complete').textContent = counts['ai-complete'];
      }

      // Search
      function searchChat(query) {
        const q = query.toLowerCase();
        const filteredChats = mockChats.filter(c =>
          c.status === currentTab &&
          (c.name.toLowerCase().includes(q) || c.phone.includes(q))
        );

        const chatList = document.getElementById('chat-list');
        if (filteredChats.length === 0) {
          chatList.innerHTML = `
            <div class="flex flex-col items-center justify-center h-64 text-gray-400">
              <svg class="w-10 h-10 mb-2 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
              </svg>
              <p class="text-sm">ไม่พบผลลัพธ์</p>
            </div>`;
        } else {
          chatList.innerHTML = filteredChats.map(chat => createChatItem(chat)).join('');
        }
      }
    </script>
    <script src="../components/sidebar.js"></script>
  </body>
</html>
