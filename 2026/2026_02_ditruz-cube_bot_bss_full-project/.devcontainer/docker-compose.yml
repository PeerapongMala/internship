# docker-compose.yml — base config สำหรับ devcontainer
# mount เพิ่มเติม (.claude) อยู่ใน docker-compose.devcontainer.yml (auto-generated by pre-start.sh)

services:
  app:
    image: mcr.microsoft.com/devcontainers/dotnet:8.0
    volumes:
      - ..:/workspaces/project:cached
    network_mode: host
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ftp:
    image: fauria/vsftpd
    env_file: .env              # passes vars to container runtime (copied by pre-start.sh)
    ports:
      - "${FTP_PORT:-9221}:21"
      - "${FTP_PASV_MIN_PORT:-9200}-${FTP_PASV_MAX_PORT:-9220}:${FTP_PASV_MIN_PORT:-9200}-${FTP_PASV_MAX_PORT:-9220}"
    volumes:
      - ../ftp_data:/home/vsftpd
      - ./run-ftp.sh:/run-ftp.sh:ro
    command: ["bash", "/run-ftp.sh"]
